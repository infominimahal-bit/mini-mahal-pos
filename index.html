    <script>
      // Apply dark theme immediately to prevent flashing
      const theme = localStorage.getItem('theme') || 'dark'; // Always default to dark
      if (theme !== 'light') {
        document.documentElement.classList.add('dark');
      }

      // Unregister any active service worker in local development mode to prevent white screens on refresh
      if (
        location.hostname === 'localhost' || 
        location.hostname === '127.0.0.1' || 
        location.hostname.startsWith('192.168.') || 
        location.hostname.startsWith('10.') || 
        location.port !== ''
      ) {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            for (var i = 0; i < registrations.length; i++) {
              registrations[i].unregister().then(function(success) {
                if (success) {
                  console.log('Unregistered active service worker for local development');
                  location.reload();
                }
              });
            }
          });
        }
      }
    </script>
  </head>
  <body class="bg-[#0A0A0A] text-gray-100 transition-colors duration-300">

    <script type="module" src="src/main.tsx"></script>
